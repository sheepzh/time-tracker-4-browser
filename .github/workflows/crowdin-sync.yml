name: Sync Crowdin
on: [workflow_dispatch]
jobs:
    sync:
        runs-on: ubuntu-latest
        env:
            TIMER_CROWDIN_AUTH: ${{ secrets.TIMER_CROWDIN_AUTH }}
        steps:
            - uses: actions/checkout@v7
              with:
                  fetch-depth: 1
            - name: Test using Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "v24"
            - name: Install dependencies
              run: npm install
            - name: Sync source
              run: npx tsx --tsconfig ./tsconfig.node.json ./script/crowdin/sync-source.ts
            - name: Sync translations
              run: npx tsx --tsconfig ./tsconfig.node.json ./script/crowdin/sync-translation.ts
